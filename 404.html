<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Hutch Steadman</title>
  <meta name="description" content="Page not found on hutchy.dev">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%236366f1'/><text x='50' y='68' font-size='50' font-family='system-ui' font-weight='800' text-anchor='middle' fill='white'>HS</text></svg>">
  <style>
    :root {
      --bg: #0f172a;
      --card: #111c34;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #818cf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(129, 140, 248, 0.18), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(236, 72, 153, 0.14), transparent 24%),
        var(--bg);
    }

    .card {
      max-width: 640px;
      width: 100%;
      text-align: center;
      background: rgba(17, 28, 52, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 24px;
      padding: 3rem 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
    }

    .code {
      font-size: clamp(4rem, 12vw, 7rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--accent), #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      margin-bottom: 0.85rem;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 1.3rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #ec4899);
      color: white;
    }

    .btn-secondary {
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(255, 255, 255, 0.04);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="code">404</div>
    <h1>That page does not exist.</h1>
    <p>You probably hit a bad link or typed the wrong URL. The rest of `hutchy.dev` is still working.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Go home</a>
      <a class="btn btn-secondary" href="/#projects">View projects</a>
    </div>
  </main>
</body>
</html>
